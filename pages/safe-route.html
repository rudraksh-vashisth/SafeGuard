<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeGuard | AI Smart Navigation</title>
    <link rel="icon" type="image/png" href="../assets/images/Logo.png">
    
    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Google Maps API - Replace YOUR_API_KEY -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places"></script>

    <!-- Core Styles -->
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <link rel="stylesheet" href="../styles/animations.css">

    <style>
        /* Senior Developer UI Refinements */
        :root {
            --bg-color: #05060f;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --accent-blue: #00d2ff;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        [data-theme="light"] {
            --bg-color: #f1f3f6; /* Professional Pearl Gray - Not too white */
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --accent-blue: #2563eb;
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            transition: background-color 0.5s ease;
        }

        #map-canvas { 
            height: 450px; 
            width: 100%; 
            border-radius: 2.5rem; 
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Sleek Dropdown Customization */
        select {
            cursor: pointer;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 1rem center;
            background-repeat: no-repeat;
            background-size: 1.2em 1.2em;
            padding-right: 2.5rem !important;
        }

        select:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        /* Fixed viewport to stop sliding */
        #main-content {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>

<body class="pb-32 overflow-x-hidden">
    <div class="mesh-bg"></div>

    <!-- 1. SPLASH SCREEN (Unified Branding) -->
    <div id="splash-screen">
        <div class="splash-content text-center">
            <div class="logo-circle">
                <div class="inner-pulse"></div>
                <img src="../assets/images/Logo.png" alt="SafeGuard Logo">
            </div>
            <div class="welcome-container">
                <p class="welcome-subtext">AI Intelligence</p>
                <h1 class="welcome-main-text">SAFE<span style="color: var(--accent-blue);">ROUTE</span></h1>
            </div>
        </div>
    </div>

    <!-- 2. MAIN CONTENT (Optimized for Laptop & Mobile) -->
    <main id="main-content" class="hidden px-4 md:px-6 max-w-7xl mx-auto opacity-0 transition-opacity duration-1000">
        
        <!-- Header -->
        <header class="header-centered mt-8 mb-10">
            <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight">AI Safe <span class="text-blue-500">Route</span></h1>
            <p class="text-[10px] font-bold uppercase tracking-[0.4em] opacity-40 mt-3">Live Risk Analysis & Navigation</p>
        </header>

        <!-- Functional Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 w-full">
            
            <!-- SELECTION PANEL (4 Columns on Laptop) -->
            <div class="lg:col-span-4 space-y-6 animate-pop-in">
                
                <div class="glass-panel p-6 md:p-8 rounded-[2.5rem]">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 shadow-inner">
                            <i class="fa-solid fa-location-dot"></i>
                        </div>
                        <h3 class="text-xs font-black tracking-widest uppercase opacity-40">Origin Point</h3>
                    </div>
                    
                    <div class="space-y-4">
                        <select id="stateSelect" class="w-full bg-black/5 border border-black/5 rounded-2xl p-4 text-sm font-semibold outline-none focus:border-blue-400 transition-all appearance-none">
                            <option value="">Select State</option>
                        </select>

                        <select id="districtSelect" class="w-full bg-black/5 border border-black/5 rounded-2xl p-4 text-sm font-semibold outline-none focus:border-blue-400 transition-all appearance-none" disabled>
                            <option value="">Select District</option>
                        </select>

                        <select id="areaSelect" class="w-full bg-black/5 border border-black/5 rounded-2xl p-4 text-sm font-semibold outline-none focus:border-blue-400 transition-all appearance-none" disabled>
                            <option value="">Select Local Area</option>
                        </select>
                    </div>
                </div>

                <div class="glass-panel p-6 md:p-8 rounded-[2.5rem]">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-500 shadow-inner">
                            <i class="fa-solid fa-flag-checkered"></i>
                        </div>
                        <h3 class="text-xs font-black tracking-widest uppercase opacity-40">Destination</h3>
                    </div>
                    
                    <input type="text" id="destinationInput" placeholder="Landmark or street..." 
                        class="w-full bg-black/5 border border-black/5 rounded-2xl p-4 text-sm font-semibold text-[var(--text-main)] outline-none focus:border-blue-400 transition-all">
                    
                    <button id="analyzeBtn" class="w-full mt-6 bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-500/30 hover:bg-blue-700 active:scale-[0.98] transition-all text-xs uppercase tracking-widest">
                        Analyze Safest Route <i class="fa-solid fa-bolt ml-1"></i>
                    </button>
                </div>
            </div>

            <!-- MAP & REPORT PANEL (8 Columns on Laptop) -->
            <div class="lg:col-span-8">
                <div class="glass-panel p-3 rounded-[3rem] h-full flex flex-col">
                    
                    <!-- Internal Loading Layer -->
                    <div id="loadingArea" class="hidden absolute inset-0 z-20 bg-[var(--bg-color)]/90 backdrop-blur-md rounded-[3rem] flex flex-col items-center justify-center">
                        <lottie-player src="https://lottie.host/742b7811-92b0-466d-88b0-a3598007a891/m5D7kYIeXy.json" background="transparent" speed="1.2" style="width: 120px; height: 120px;" loop autoplay></lottie-player>
                        <p class="text-xs font-black tracking-[0.4em] uppercase text-blue-500 mt-6 animate-pulse">Calculating Risk Index...</p>
                    </div>

                    <div id="map-canvas"></div>

                    <!-- AI Safety Report Area -->
                    <div id="reportArea" class="hidden mt-4 p-6 bg-white/5 border border-white/5 rounded-[2rem] animate-pop-in">
                        <!-- Content Injected via safe-route.js -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Shared Bottom Nav -->
    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-md h-20 glass-panel rounded-[2.5rem] flex items-center justify-around px-6 z-50">
        <a href="dashboard.html" class="group flex flex-col items-center gap-1 transition-all">
            <i class="fa-solid fa-house text-white/30 group-hover:text-blue-400 text-lg"></i>
            <span class="text-[8px] font-black tracking-widest text-white/20 group-hover:text-blue-400 uppercase">Home</span>
        </a>
        <a href="safe-route.html" class="group flex flex-col items-center gap-1 transition-all">
            <div class="p-2 rounded-xl bg-blue-500/10">
                <i class="fa-solid fa-route text-blue-400 text-lg"></i>
            </div>
            <span class="text-[8px] font-black tracking-widest text-blue-400 uppercase">Route</span>
        </a>
        <a href="emergency-contacts.html" class="group flex flex-col items-center gap-1 transition-all">
            <i class="fa-solid fa-phone text-white/30 group-hover:text-blue-400 text-lg"></i>
            <span class="text-[8px] font-black tracking-widest text-white/20 group-hover:text-blue-400 uppercase">Contacts</span>
        </a>
        <a href="settings.html" class="group flex flex-col items-center gap-1 transition-all">
            <i class="fa-solid fa-gear text-white/30 group-hover:text-blue-400 text-lg"></i>
            <span class="text-[8px] font-black tracking-widest text-white/20 group-hover:text-blue-400 uppercase">Settings</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="../scripts/ui-controller.js"></script>
    <script src="../scripts/location-data.js"></script>
    <script src="../scripts/safe-route.js"></script>
</body>

</html>
